<!doctype html>
<html>
<head><meta charset="utf-8"><title>GM Test</title></head>
<body>
<div id="map" style="height:300px"></div>
<pre id="out">loading...</pre>
<script>
  window.gm_authFailure = function () {
    document.getElementById("out").textContent = "GM_AUTH_FAILURE";
  };
  window.initMap = function () {
    try {
      new google.maps.Map(document.getElementById("map"), {
        center: { lat: -0.1076661, lng: -78.4916898 },
        zoom: 15,
      });
      document.getElementById("out").textContent = "MAP_OK";
    } catch (e) {
      document.getElementById("out").textContent = "MAP_ERR:" + e.message;
    }
  };
  window.gm_authFailure = window.gm_authFailure;
</script>
<script
  async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC951g1Mpbu2tbaRaH6wh5VRdyE-kdjuwk&callback=initMap"
  onerror="document.getElementById('out').textContent='SCRIPT_ONERROR'"
></script>
</body>
</html>
